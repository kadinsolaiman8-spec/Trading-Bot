# Discord Trading Bot Configuration

# Guild (server) ID for instant slash command sync (right-click server icon -> Copy ID)
# Optional: if set, /recap and /tutorial appear immediately after bot restart
guild_id: 1476735819522900031

# Channel ID for auto-recap posts (get from Discord: right-click channel -> Copy ID)
channel_id: 1476735820215091204

# How often to run auto recap when market is open (minutes)
recap_interval_minutes: 30

# Minimum confidence (1-100) to show a signal in recap. Higher = fewer, stronger signals only.
min_confidence: 70

# Days of historical data to fetch for indicator calculation
data_period_days: 60

# Indicator parameters (tune for sensitivity)
indicators:
  rsi_period: 14
  rsi_oversold: 35
  rsi_overbought: 65
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  supertrend_period: 10
  supertrend_multiplier: 3
  # Stochastic
  stoch_window: 14
  stoch_smooth: 3
  stoch_oversold: 20
  stoch_overbought: 80
  # Williams %R
  willr_period: 14
  willr_oversold: -80
  willr_overbought: -20
  # EMA crossover
  ema_fast: 9
  ema_slow: 21
